    <style>
        body   {background-color: #FFFFEA;}
        input   {background-color: #FFFFEA;}
        button    {background-color: #ffb444;
                color: #12664F;
                font-family:monospace;
                font-weight: bold;
                font-size: medium;
                border-color: #12664F;
                border-style:solid;
                border-width: 3px;
            }

        button:hover   {
                background-color: #FFFFEA;
            }

        header {
            background-color:#12664F;
            height: 100px;
            margin: -8px;
        }
            
        </style>
    <title>Document</title>
</head>



<body>
    <header>Project Typewriter - Prototype 1 - Submitting 

        <nav>
            <a href="prototype1(dashboard).html">Dashboard</a> |
            <a href="prototype1(index).html">Log Out</a> |
            <a href="prototype1(submitting).html">Upload Work</a> |
            <a href="prototype1(editing).html">Edit Work</a>
            <a href="prototype1(profile).html">Profile</a>
        </nav>
    </header>
    


    
</body>

<div>
    <label>Title</label>
    <br>
    <textarea id="title"></textarea>
</div>
<div>
    <label>Description</label>
    <br>
    <textarea id="description"></textarea>
</div>
<div>
    <label>Chapter Title</label>
    <br>
    <textarea id="chapterTitle"></textarea>
</div>

<div>
    <label>Upload chapter</label>
    <p>Upload 1 chapter only. Word limit per chapter: 10,000 words</p>
    <br>
    <textarea id="content" maxlength="65000"></textarea>
</div>

<div>
    <label>Genre</label>
    <br>
    <textarea id="genre"></textarea>
</div>
<div>
    <label>Mature Content</label>
    <br>
    <Label>Yes</Label>
    <input type="checkbox" id="matureContent" value="mature">

</div>

<div>
    <label>Author's note</label>
    <br>
    <textarea id="authorNote"></textarea>

</div>

<div>
    <label>Make work private</label>
    <br>
    <label>Yes</label>
    <input type="checkbox" id="private" value="private">
    <br>
</div>

<div>
    <label>Mark work incomplete</label>
    <br>
    <label>Yes</label>
    <input type="checkbox" id="incomplete" value="incomplete">
    <br>
</div>


<div>
    <button onclick="createDocument()">Submit</button>
</div>

<div>
    <p>To make a draft, make work private and mark work incomplete for future editing. Works not submitted will not be saved.</p>
</div>








</html>
